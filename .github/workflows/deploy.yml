name: Deploy

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"

env:
  REGISTRY: registry.digitalocean.com
  REGISTRY_NAME: derma-consent
  BACKEND_IMAGE: registry.digitalocean.com/derma-consent/backend
  FRONTEND_IMAGE: registry.digitalocean.com/derma-consent/frontend
  CLUSTER_NAME: derma-consent-k8s-project
  NAMESPACE: derma-consent

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dermaconsent_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
        working-directory: packages/backend
      - run: pnpm prisma migrate deploy
        working-directory: packages/backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/dermaconsent_test
      - run: pnpm build
        working-directory: packages/backend
      - run: pnpm test
        working-directory: packages/backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/dermaconsent_test
          AUTH_SECRET: ci-test-secret
          STRIPE_SECRET_KEY: sk_test_dummy

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        working-directory: packages/frontend

  build:
    name: Build & Push Images
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 1200

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/backend/Dockerfile
          platforms: linux/amd64
          push: true
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/frontend/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.consent.eblaisian.com
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    name: Deploy to Production
    needs: [build]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}

      - name: Install kustomize
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz" -o kustomize.tar.gz
          tar xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/
          rm kustomize.tar.gz

      - name: Install nginx ingress controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.3/deploy/static/provider/do/deploy.yaml
          # Disable PROXY protocol — DO LB and nginx must match, and ACME solvers break with it
          kubectl patch configmap ingress-nginx-controller -n ingress-nginx --type merge -p '{"data":{"use-proxy-protocol":"false"}}'
          kubectl annotate svc ingress-nginx-controller -n ingress-nginx \
            service.beta.kubernetes.io/do-loadbalancer-enable-proxy-protocol="false" --overwrite
          echo "Waiting for ingress controller..."
          kubectl rollout status deployment/ingress-nginx-controller -n ingress-nginx --timeout=180s || true

      - name: Install cert-manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.17.1/cert-manager.yaml
          echo "Waiting for cert-manager..."
          kubectl rollout status deployment/cert-manager -n cert-manager --timeout=120s
          kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=120s
          echo "Waiting for CRDs to be established..."
          kubectl wait --for=condition=Established crd/clusterissuers.cert-manager.io --timeout=60s

      - name: Create ClusterIssuer
        run: kubectl apply -f infra/kubernetes/base/cert-manager/cluster-issuer.yaml

      - name: Create namespace
        run: kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Create DOCR pull secret
        run: |
          doctl registry kubernetes-manifest --namespace ${{ env.NAMESPACE }} | kubectl apply -f -

      - name: Create app secrets
        run: |
          kubectl create secret generic app-secrets \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=AUTH_SECRET="${{ secrets.AUTH_SECRET }}" \
            --from-literal=FRONTEND_URL="https://consent.eblaisian.com" \
            --from-literal=SMTP_USER="${{ secrets.SMTP_USER }}" \
            --from-literal=SMTP_PASS="${{ secrets.SMTP_PASS }}" \
            --from-literal=STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            --from-literal=STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy
        run: |
          chmod +x infra/scripts/deploy-env.sh
          infra/scripts/deploy-env.sh \
            --namespace ${{ env.NAMESPACE }} \
            --overlay prod \
            --backend-image "${{ env.BACKEND_IMAGE }}:${{ github.sha }}" \
            --frontend-image "${{ env.FRONTEND_IMAGE }}:${{ github.sha }}"

      - name: Show load balancer IP
        run: |
          echo "=== Load Balancer ==="
          kubectl get svc -n ingress-nginx ingress-nginx-controller \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
          echo ""
          echo ""
          echo "Point these DNS records to the IP above:"
          echo "  consent.eblaisian.com     → A record"
          echo "  api.consent.eblaisian.com → A record"

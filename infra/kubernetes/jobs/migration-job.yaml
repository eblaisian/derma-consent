apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  template:
    spec:
      imagePullSecrets:
        - name: registry-derma-consent
      restartPolicy: Never
      containers:
        - name: migrate
          image: BACKEND_IMAGE
          command: ["sh", "-c", "npx prisma migrate deploy && npx tsx prisma/bootstrap.ts"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
            - name: PLATFORM_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: PLATFORM_ADMIN_EMAIL
                  optional: true
            - name: PLATFORM_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: PLATFORM_ADMIN_PASSWORD
                  optional: true
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

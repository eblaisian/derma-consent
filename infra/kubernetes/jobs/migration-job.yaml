apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  template:
    spec:
      imagePullSecrets:
        - name: registry-derma-consent
      restartPolicy: Never
      containers:
        - name: migrate
          image: BACKEND_IMAGE
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
